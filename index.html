<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espelho - gasahog356-ux/beto-ola</title>
  <style>
    body {
      background: #0a0a0a;
      color: #00ff88;
      font: 18px 'Courier New', monospace;
      padding: 30px;
      white-space: pre-wrap;
    }
    .status {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="status" id="status">🟡 Aguardando primeiro texto...</div>
  <div id="conteudo"></div>

  <script>
    // Configuração correta para o seu repositório
    const REPO = 'gasahog356-ux/beto-ola';
    const ARQUIVO = 'texto_atual.json';
    const BRANCH = 'main';  // mesmo branch usado no script Python
    const URL_RAW = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${ARQUIVO}`;

    async function atualizarTexto() {
      try {
        const resp = await fetch(URL_RAW + '?t=' + Date.now()); // evita cache
        if (!resp.ok) throw new Error('Arquivo não encontrado');
        const data = await resp.json();
        document.getElementById('conteudo').textContent = data.texto;
        document.getElementById('status').textContent = 
          '🟢 Última atualização: ' + new Date(data.timestamp).toLocaleTimeString();
      } catch (e) {
        document.getElementById('status').textContent = '🔴 Erro ou aguardando envio...';
      }
    }

    atualizarTexto();
    setInterval(atualizarTexto, 3000); // verifica a cada 3 segundos
  </script>
</body>
</html>
